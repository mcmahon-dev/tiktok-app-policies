<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Auth Callback</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 60px auto; padding: 0 20px; background: #111; color: #eee; }
    h2 { color: #fff; }
    .box { background: #222; border: 1px solid #444; border-radius: 6px; padding: 16px; margin: 16px 0; word-break: break-all; }
    .code { color: #4fc; font-size: 1.1em; }
    .error { color: #f66; }
    .label { color: #888; font-size: 0.85em; margin-bottom: 6px; }
    button { margin-top: 10px; padding: 8px 16px; background: #4fc; color: #111; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 0.95em; }
    button:hover { background: #3db; }
  </style>
</head>
<body>
  <h2>TikTok OAuth Callback</h2>
  <div id="output"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const out = document.getElementById('output');

    if (error) {
      out.innerHTML = `<div class="box error"><div class="label">Error</div>${error}: ${params.get('error_description') || ''}</div>`;
    } else if (code) {
      out.innerHTML = `
        <p>Authorisation successful. Copy the code below and paste it into the GitHub Actions workflow.</p>
        <div class="box">
          <div class="label">Auth code</div>
          <span class="code" id="code">${code}</span>
        </div>
        <button onclick="navigator.clipboard.writeText(document.getElementById('code').innerText).then(()=>this.innerText='Copied!')">Copy code</button>
        <p style="color:#888; font-size:0.85em; margin-top:24px;">Codes expire quickly — paste it into the workflow immediately.</p>`;
    } else {
      out.innerHTML = `<div class="box error">No code or error found in the URL. Did TikTok redirect here correctly?</div>`;
    }
  </script>
</body>
</html>
